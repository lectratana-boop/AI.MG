<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI.MG - Privé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #08080a; color: #f1f5f9; }
        .glass { background: rgba(18, 18, 22, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .paid { border-left: 4px solid #10b981; }
        .unpaid { border-left: 4px solid #ef4444; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="aimg()" x-init="init()">

    <div x-show="showSplash" class="fixed inset-0 z-[100] bg-black flex flex-col items-center justify-center">
        <video id="v" autoplay muted playsinline class="w-full h-full object-cover" @ended="showSplash = false">
            <source src="splash.mp4" type="video/mp4">
        </video>
        <div class="absolute bottom-10">
            <button @click="showSplash = false" class="px-6 py-2 bg-white/10 rounded-full text-xs border border-white/20">Passer l'intro</button>
        </div>
    </div>

    <div x-show="!showSplash && !isLoggedIn" class="min-h-screen flex items-center justify-center p-6" x-cloak>
        <div class="glass p-8 rounded-[2rem] w-full max-w-sm text-center">
            <h1 class="text-3xl font-black mb-8 text-indigo-500">AI.MG</h1>
            <div class="space-y-4">
                <input type="email" x-model="form.email" placeholder="Email" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-indigo-500">
                <input type="password" x-model="form.pass" placeholder="Mot de passe" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl outline-none focus:border-indigo-500">
                <button @click="login" class="w-full bg-indigo-600 py-4 rounded-xl font-bold">Connexion</button>
                <p x-text="error" class="text-red-400 text-xs"></p>
            </div>
        </div>
    </div>

    <div x-show="isLoggedIn" class="flex flex-col h-screen" x-cloak>
        <header class="p-6 flex justify-between items-center glass">
            <span class="font-black text-xl tracking-tighter">AI.MG</span>
            <span class="text-xs bg-indigo-600/20 text-indigo-400 px-3 py-1 rounded-full capitalize" x-text="tab"></span>
        </header>

        <main class="flex-1 overflow-y-auto p-4 pb-24">
            
            <div x-show="tab === 'portefeuille'" class="space-y-6">
                <div class="glass p-8 rounded-[2rem] text-center">
                    <p class="text-xs text-gray-500 uppercase mb-2">Salaire Mensuel</p>
                    <input type="number" x-model.number="db.salary" class="bg-transparent text-5xl font-black text-white text-center w-full focus:outline-none">
                    <p class="text-xs text-indigo-400 mt-4">NET MENSUEL : <span class="text-xl font-bold" x-text="formatAr(db.salary - calcTotalPaid())"></span></p>
                </div>
            </div>

            <div x-show="tab === 'facturation'" class="space-y-3">
                <template x-for="(f, id) in db.bills">
                    <div @click="openBill(id)" class="glass p-4 rounded-2xl flex justify-between items-center transition-all active:scale-95" :class="f.paid ? 'paid' : 'unpaid'">
                        <div class="flex items-center gap-3">
                            <span class="text-xl" x-text="f.emoji"></span>
                            <div>
                                <p class="text-sm font-bold" x-text="f.label"></p>
                                <p class="text-[10px] text-gray-500" x-text="f.paid ? 'Payé' : 'En attente'"></p>
                            </div>
                        </div>
                        <span class="font-bold text-sm" x-text="formatAr(f.amount)"></span>
                    </div>
                </template>
            </div>
        </main>

        <nav class="fixed bottom-0 inset-x-0 glass h-20 flex justify-around items-center border-t border-white/5">
            <button @click="tab='portefeuille'" :class="tab==='portefeuille'?'text-indigo-500':''"><i data-lucide="wallet"></i></button>
            <button @click="tab='facturation'" :class="tab==='facturation'?'text-indigo-500':''"><i data-lucide="receipt"></i></button>
            <button @click="tab='tache'" :class="tab==='tache'?'text-indigo-500':''"><i data-lucide="calendar"></i></button>
            <button @click="tab='aiza'" :class="tab==='aiza'?'text-indigo-500':''"><i data-lucide="map-pin"></i></button>
        </nav>

        <div x-show="showModal" class="fixed inset-0 z-50 flex items-end justify-center bg-black/80 p-4" x-cloak>
            <div class="glass w-full max-w-sm p-8 rounded-[2.5rem] animate-slide-up">
                <div class="flex justify-between items-start mb-6">
                    <h2 class="text-2xl font-bold" x-text="db.bills[activeId]?.label"></h2>
                    <button @click="showModal = false" class="p-2 bg-white/5 rounded-full">✕</button>
                </div>
                <div class="space-y-6">
                    <div>
                        <label class="text-xs text-gray-500 uppercase">Prix de consommation</label>
                        <input type="number" x-model.number="db.bills[activeId].amount" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mt-2 outline-none text-2xl font-bold">
                    </div>
                    <button @click="togglePaid()" :class="db.bills[activeId]?.paid ? 'bg-green-600' : 'bg-red-600'" class="w-full py-4 rounded-xl font-bold text-white transition-colors" x-text="db.bills[activeId]?.paid ? 'PAYÉ' : 'MARQUER COMME PAYÉ'"></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBY_zHJAaNLtXDBlD1TYMzALlMlMHNBwWk",
            authDomain: "aiza-38b31.firebaseapp.com",
            databaseURL: "https://aiza-38b31-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "aiza-38b31",
            storageBucket: "aiza-38b31.firebasestorage.app",
            messagingSenderId: "850157491678",
            appId: "1:850157491678:web:614b2b70b934cf09fcb94f"
        };
        firebase.initializeApp(firebaseConfig);

        function aimg() {
            return {
                showSplash: true,
                isLoggedIn: false,
                tab: 'portefeuille',
                showModal: false,
                activeId: null,
                form: { email: '', pass: '' },
                error: '',
                db: {
                    salary: 0,
                    bills: {
                        loyer: { label: 'Loyer', amount: 0, paid: false, emoji: '🏠' },
                        jirama: { label: 'JIRAMA', amount: 0, paid: false, emoji: '⚡' },
                        internet: { label: 'Internet / Wi-Fi', amount: 0, paid: false, emoji: '🌐' },
                        ecolage: { label: 'Écolage', amount: 0, paid: false, emoji: '🎓' },
                        repas: { label: 'Repas Quotidien', amount: 0, paid: false, emoji: '🍽️' },
                        carburant: { label: 'Carburant', amount: 0, paid: false, emoji: '🚗' }
                    }
                },
                init() {
                    setTimeout(() => { this.showSplash = false; lucide.createIcons(); }, 8000);
                },
                login() {
                    firebase.auth().signInWithEmailAndPassword(this.form.email, this.form.pass)
                        .then(u => { this.isLoggedIn = true; this.sync(u.user.uid); })
                        .catch(e => { this.error = "Accès refusé"; });
                },
                sync(uid) {
                    const ref = firebase.database().ref('aimg_private/' + uid);
                    ref.on('value', s => { if(s.exists()) this.db = s.val(); });
                    this.$watch('db', v => ref.set(JSON.parse(JSON.stringify(v))), {deep:true});
                },
                openBill(id) { this.activeId = id; this.showModal = true; },
                togglePaid() { this.db.bills[this.activeId].paid = !this.db.bills[this.activeId].paid; },
                calcTotalPaid() {
                    return Object.values(this.db.bills).reduce((t, b) => t + (b.paid ? b.amount : 0), 0);
                },
                formatAr(v) { return new Intl.NumberFormat('fr-FR').format(v || 0) + ' Ar'; }
            }
        }
    </script>
</body>
</html>
