<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI.MG</title>

<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
body { background:#0a0a0f; color:white; font-family: Inter; }
.glass { background:rgba(255,255,255,0.05); backdrop-filter:blur(20px); }
.active { background:#6366f1; }
</style>
</head>

<body x-data="app()" x-init="init()">

<!-- SPLASH -->
<template x-if="showSplash">
<div class="fixed inset-0 z-50">
<video autoplay muted playsinline class="w-full h-full object-cover"
@ended="showSplash=false">
<source src="splash.mp4" type="video/mp4">
</video>
</div>
</template>

<!-- LOGIN -->
<template x-if="!showSplash && !isLogged">
<div class="flex items-center justify-center h-screen">
<div class="glass p-8 rounded-3xl w-[350px] text-center">

<h1 class="text-3xl font-bold mb-6">AI.MG</h1>

<input x-model="email" placeholder="Email"
class="w-full p-3 mb-3 rounded-xl bg-black/40">

<input type="password" x-model="password"
placeholder="Mot de passe"
class="w-full p-3 mb-4 rounded-xl bg-black/40">

<button @click="login"
class="w-full bg-indigo-600 py-3 rounded-xl">
Connexion
</button>

<p class="text-red-400 text-sm mt-2" x-text="error"></p>

</div>
</div>
</template>

<!-- APP -->
<div x-show="isLogged" class="flex h-screen">

<!-- MENU -->
<div class="w-64 glass p-4 space-y-3">

<h2 class="text-xl font-bold mb-6">AI.MG</h2>

<template x-for="m in menu">
<button @click="tab=m"
:class="tab===m ? 'active' : ''"
class="w-full text-left p-3 rounded-xl">
<span x-text="m"></span>
</button>
</template>

<button @click="logout" class="mt-10 text-red-400">
Déconnexion
</button>

</div>

<!-- CONTENU -->
<div class="flex-1 p-6 overflow-auto">

<!-- PORTEFEUILLE -->
<div x-show="tab==='Portefeuille'">

<h2 class="text-2xl mb-4">Portefeuille</h2>

<input type="number" x-model.number="salary"
placeholder="Salaire"
class="p-3 rounded-xl bg-black/40 mb-4">

<div class="space-y-2">
<template x-for="c in categories">
<div class="flex justify-between bg-black/30 p-3 rounded-xl">
<span x-text="c"></span>
<span x-text="getTotal(c) + ' Ar'"></span>
</div>
</template>
</div>

<div class="mt-6 text-xl">
Net : <span x-text="net()"></span>
</div>

</div>

<!-- FACTURATION -->
<div x-show="tab==='Facturation'">

<h2 class="text-2xl mb-4">Facturation</h2>

<template x-for="(items,cat) in factures">
<div class="mb-6">

<h3 class="font-bold mb-2" x-text="cat"></h3>

<template x-for="item in items">
<div class="flex justify-between items-center bg-black/30 p-3 rounded-xl mb-2">

<span x-text="item.name"></span>

<div class="flex gap-2">
<input type="number" x-model.number="item.value"
class="w-24 p-2 bg-black/40 rounded">

<button @click="item.paid=!item.paid"
:class="item.paid ? 'bg-green-500' : 'bg-red-500'"
class="px-3 rounded">
✔
</button>
</div>

</div>
</template>

</div>
</template>

</div>

<!-- TACHE -->
<div x-show="tab==='Tache'">
<h2 class="text-2xl mb-4">Calendrier</h2>

<textarea placeholder="Ajouter tâche..."
class="w-full p-3 bg-black/40 rounded"></textarea>
</div>

<!-- LOCALISATION -->
<div x-show="tab==='Localisation'">
<h2 class="text-2xl">Localisation (AIZA)</h2>
<p>Suivi des objets maison / store</p>
</div>

<!-- DIVERS -->
<div x-show="tab==='Divers'">
<h2 class="text-2xl">Divers</h2>
<button class="bg-indigo-600 p-2 rounded">Rename catégorie</button>
</div>

</div>
</div>

<script>
var firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
databaseURL: "YOUR_DB",
};
firebase.initializeApp(firebaseConfig);

function app(){
return{
showSplash:true,
isLogged:false,
email:'',
password:'',
error:'',
tab:'Portefeuille',

menu:['Portefeuille','Facturation','Tache','Localisation','Divers'],

salary:0,

categories:['Logement','Services','Education','Medical','Transport','Loisir'],

factures:{
Logement:[
{name:'Loyer',value:0,paid:false},
{name:'JIRAMA',value:0,paid:false}
],
Services:[
{name:'Internet',value:0,paid:false},
{name:'Téléphone',value:0,paid:false}
],
Education:[
{name:'Ecolage',value:0,paid:false}
],
Medical:[
{name:'Consultation',value:0,paid:false}
],
Transport:[
{name:'Carburant',value:0,paid:false}
],
Loisir:[
{name:'Sorties',value:0,paid:false},
{name:'ADIDY',value:0,paid:false}
]
},

init(){
setTimeout(()=>this.showSplash=false,30000)
},

login(){
firebase.auth().signInWithEmailAndPassword(this.email,this.password)
.then(()=>this.isLogged=true)
.catch(()=>this.error="Erreur login")
},

logout(){
firebase.auth().signOut().then(()=>location.reload())
},

getTotal(cat){
return this.factures[cat]
.filter(i=>i.paid)
.reduce((t,i)=>t+i.value,0)
},

net(){
let total=0
for(let c in this.factures){
total+=this.getTotal(c)
}
return (this.salary-total)+" Ar"
}

}
}
</script>

</body>
</html>
