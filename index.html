<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI.MG - Gestion Intégrée</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050507; color: #e2e8f0; }
        .glass { background: rgba(20, 20, 25, 0.8); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .neon-glow { box-shadow: 0 0 15px rgba(99, 102, 241, 0.3); }
        .active-tab { color: #818cf8; background: rgba(99, 102, 241, 0.1); border-radius: 12px; }
        [x-cloak] { display: none !important; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body x-data="aimgApp()" x-init="init()">

    <template x-if="showSplash">
        <div class="fixed inset-0 z-[100] bg-black flex items-center justify-center">
            <video autoplay muted playsinline class="w-full h-full object-cover" @ended="showSplash = false">
                <source src="splash.mp4" type="video/mp4">
            </video>
            <div class="absolute inset-0 bg-black/40 flex items-center justify-center">
                <h1 class="text-4xl font-black tracking-tighter text-white">AI.MG</h1>
            </div>
        </div>
    </template>

    <template x-if="!showSplash && !isLoggedIn">
        <div class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-b from-[#050507] to-[#101018]">
            <div class="glass p-8 rounded-[2.5rem] w-full max-w-md text-center">
                <div class="text-4xl font-black mb-2 text-indigo-500">AI.MG</div>
                <p class="text-gray-500 text-sm mb-8">Connectez-vous à votre espace privé</p>
                <div class="space-y-4 text-left">
                    <input type="email" x-model="loginData.email" placeholder="Email" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-indigo-500 transition-all">
                    <input type="password" x-model="loginData.pass" placeholder="Mot de passe" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none focus:border-indigo-500 transition-all">
                    <button @click="handleLogin" class="w-full bg-indigo-600 hover:bg-indigo-500 py-4 rounded-2xl font-bold text-white shadow-lg shadow-indigo-600/20 active:scale-95 transition-all">Accéder à l'interface</button>
                    <p x-show="error" x-text="error" class="text-red-400 text-center text-xs mt-2" x-cloak></p>
                </div>
            </div>
        </div>
    </template>

    <div class="flex flex-col h-screen" x-show="isLoggedIn" x-cloak>
        
        <header class="p-6 flex justify-between items-center border-b border-white/5">
            <div>
                <h1 class="text-xl font-bold text-indigo-400">AI.MG</h1>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest" x-text="currentTab"></p>
            </div>
            <button @click="handleLogout" class="p-2 bg-white/5 rounded-full"><i data-lucide="log-out" class="w-5 h-5 text-gray-400"></i></button>
        </header>

        <main class="flex-1 overflow-y-auto p-6 pb-24">
            
            <div x-show="currentTab === 'portefeuille'" class="space-y-6">
                <div class="glass p-8 rounded-[2rem] text-center">
                    <p class="text-xs text-gray-500 uppercase mb-2">Salaire Mensuel</p>
                    <div class="flex items-center justify-center gap-2">
                        <input type="number" x-model.number="db.salary" class="bg-transparent text-4xl font-black text-white text-center w-full focus:outline-none">
                        <span class="text-indigo-500 font-bold">Ar</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="glass p-6 rounded-2xl">
                        <p class="text-[10px] text-gray-500 uppercase">Dépenses</p>
                        <p class="text-xl font-bold text-red-400" x-text="formatAr(totalSpent())"></p>
                    </div>
                    <div class="glass p-6 rounded-2xl border-indigo-500/30">
                        <p class="text-[10px] text-gray-500 uppercase">Net Mensuel</p>
                        <p class="text-xl font-bold text-green-400" x-text="formatAr(db.salary - totalSpent())"></p>
                    </div>
                </div>
            </div>

            <div x-show="currentTab === 'facturation'" class="space-y-4">
                <template x-for="(cat, key) in categories">
                    <div class="glass p-5 rounded-2xl flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <span class="text-2xl" x-text="cat.emoji"></span>
                            <div>
                                <p class="font-semibold text-sm" x-text="cat.name"></p>
                                <p class="text-[10px] text-gray-500" x-text="db.bills[key] ? formatAr(db.bills[key]) : '0 Ar'"></p>
                            </div>
                        </div>
                        <button @click="openBill(key)" class="p-2 bg-indigo-600/20 text-indigo-400 rounded-lg"><i data-lucide="chevron-right" class="w-4 h-4"></i></button>
                    </div>
                </template>
            </div>

            <div x-show="currentTab === 'tache'" class="space-y-4">
                <div class="glass p-4 rounded-2xl flex gap-2">
                    <input type="text" x-model="newTask" placeholder="Nouvelle tâche..." class="flex-1 bg-transparent border-none outline-none text-sm">
                    <button @click="addTask" class="bg-indigo-600 p-2 rounded-xl"><i data-lucide="plus" class="w-5 h-5"></i></button>
                </div>
                <div class="space-y-2">
                    <template x-for="(t, index) in db.tasks">
                        <div class="glass p-4 rounded-xl flex items-center justify-between">
                            <span x-text="t" class="text-sm"></span>
                            <button @click="db.tasks.splice(index, 1)" class="text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                        </div>
                    </template>
                </div>
            </div>

            <div x-show="currentTab === 'localisation'" class="space-y-4">
                <div class="glass p-6 rounded-2xl text-center border-dashed border-white/20">
                    <i data-lucide="map-pin" class="w-10 h-10 mx-auto mb-4 text-indigo-500"></i>
                    <h3 class="font-bold">Module AIZA</h3>
                    <p class="text-xs text-gray-500 mt-2">Localisation des objets Maison / Store</p>
                    <button class="mt-6 w-full bg-white/5 py-3 rounded-xl text-sm border border-white/10">Scanner un objet</button>
                </div>
            </div>

        </main>

        <div x-show="modalBill" class="fixed inset-0 z-50 flex items-end justify-center bg-black/60 p-4" x-cloak>
            <div class="glass w-full max-w-md p-8 rounded-[2rem] animate-slide-up">
                <h2 class="text-xl font-bold mb-6 flex items-center gap-3">
                    <span x-text="categories[activeBill]?.emoji"></span>
                    <span x-text="categories[activeBill]?.name"></span>
                </h2>
                <div class="space-y-6">
                    <div>
                        <label class="text-[10px] text-gray-500 uppercase">Montant Consommé (Ar)</label>
                        <input type="number" x-model.number="db.bills[activeBill]" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mt-2 outline-none focus:border-indigo-500">
                    </div>
                    <div class="flex gap-3">
                        <button @click="modalBill = false" class="flex-1 bg-white/5 py-4 rounded-xl font-bold">Annuler</button>
                        <button @click="modalBill = false" class="flex-1 bg-indigo-600 py-4 rounded-xl font-bold">Enregistrer</button>
                    </div>
                </div>
            </div>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 glass h-20 flex items-center justify-around px-4 border-t border-white/10">
            <button @click="currentTab = 'portefeuille'" :class="currentTab === 'portefeuille' ? 'active-tab' : ''" class="flex flex-col items-center p-2">
                <i data-lucide="wallet" class="w-6 h-6"></i>
                <span class="text-[8px] mt-1 uppercase font-bold">Wallet</span>
            </button>
            <button @click="currentTab = 'facturation'" :class="currentTab === 'facturation' ? 'active-tab' : ''" class="flex flex-col items-center p-2">
                <i data-lucide="receipt" class="w-6 h-6"></i>
                <span class="text-[8px] mt-1 uppercase font-bold">Bills</span>
            </button>
            <button @click="currentTab = 'tache'" :class="currentTab === 'tache' ? 'active-tab' : ''" class="flex flex-col items-center p-2">
                <i data-lucide="calendar-check" class="w-6 h-6"></i>
                <span class="text-[8px] mt-1 uppercase font-bold">Tasks</span>
            </button>
            <button @click="currentTab = 'localisation'" :class="currentTab === 'localisation' ? 'active-tab' : ''" class="flex flex-col items-center p-2">
                <i data-lucide="map" class="w-6 h-6"></i>
                <span class="text-[8px] mt-1 uppercase font-bold">Aiza</span>
            </button>
        </nav>
    </div>

    <script>
        // CONFIGURATION FIREBASE (REMPLACER PAR VOS CLES)
        const firebaseConfig = {
            apiKey: "AIzaSyBY_zHJAaNLtXDBlD1TYMzALlMlMHNBwWk",
            authDomain: "aiza-38b31.firebaseapp.com",
            databaseURL: "https://aiza-38b31-default-rtdb.europe-west1.firebasedatabase.app/",
            projectId: "aiza-38b31",
            storageBucket: "aiza-38b31.firebasestorage.app",
            messagingSenderId: "850157491678",
            appId: "1:850157491678:web:614b2b70b934cf09fcb94f"
        };
        firebase.initializeApp(firebaseConfig);

        function aimgApp() {
            return {
                showSplash: true,
                isLoggedIn: false,
                currentTab: 'portefeuille',
                modalBill: false,
                activeBill: null,
                newTask: '',
                loginData: { email: '', pass: '' },
                error: '',
                
                categories: {
                    loyer: { name: 'Logement / Loyer', emoji: '🏠' },
                    jirama: { name: 'JIRAMA', emoji: '⚡' },
                    internet: { name: 'Internet / Wi-Fi', emoji: '🌐' },
                    tele: { name: 'Abonnement TV', emoji: '📺' },
                    ecolage: { name: 'Écolage', emoji: '🎓' },
                    sante: { name: 'Santé / Médical', emoji: '🏥' },
                    repas: { name: 'Alimentation', emoji: '🍽️' },
                    carburant: { name: 'Carburant', emoji: '🚗' },
                    loisirs: { name: 'Loisirs / ADIDY', emoji: '🎉' }
                },

                db: {
                    salary: 0,
                    bills: {},
                    tasks: [],
                    aiza: []
                },

                init() {
                    setTimeout(() => { this.showSplash = false; lucide.createIcons(); }, 3000);
                },

                handleLogin() {
                    firebase.auth().signInWithEmailAndPassword(this.loginData.email, this.loginData.pass)
                        .then(user => {
                            this.isLoggedIn = true;
                            this.syncData(user.user.uid);
                            setTimeout(() => lucide.createIcons(), 100);
                        })
                        .catch(err => this.error = "Erreur d'accès");
                },

                syncData(uid) {
                    const ref = firebase.database().ref('aimg_data/' + uid);
                    ref.on('value', snap => { if(snap.exists()) this.db = snap.val(); });
                    this.$watch('db', val => ref.set(JSON.parse(JSON.stringify(val))), {deep:true});
                },

                totalSpent() {
                    return Object.values(this.db.bills).reduce((a, b) => a + (Number(b) || 0), 0);
                },

                formatAr(v) {
                    return new Intl.NumberFormat('fr-FR').format(v || 0) + ' Ar';
                },

                openBill(key) {
                    this.activeBill = key;
                    this.modalBill = true;
                    setTimeout(() => lucide.createIcons(), 50);
                },

                addTask() {
                    if(this.newTask) {
                        this.db.tasks.push(this.newTask);
                        this.newTask = '';
                    }
                },

                handleLogout() {
                    firebase.auth().signOut().then(() => location.reload());
                }
            }
        }
    </script>
</body>
</html>
